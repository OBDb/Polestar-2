generations:
  - name: "First Generation"
    start_year: 2020
    end_year: 2023
    description: "The Polestar 2 is the first all-electric volume model from Polestar, Volvo's performance and electrification sub-brand. Built on Volvo's Compact Modular Architecture (CMA) platform, it features distinctive fastback styling that blends elements of sedans, hatchbacks, and crossovers with minimalist Scandinavian design principles. Initially launched as a high-performance dual-motor AWD variant with 408 horsepower (300 kW) and 487 lb-ft (660 Nm) of torque, a single-motor FWD version with 231-299 horsepower (depending on model year and battery) was added later. Battery options include a 64 kWh standard-range pack (made by CATL) and a 78 kWh long-range pack, providing EPA-rated ranges from approximately 220-270 miles depending on configuration. Performance is brisk with 0-60 mph acceleration in as little as 4.2 seconds for dual-motor variants. The interior showcases minimalist design with high-quality sustainable materials including available WeaveTech vegan upholstery. Technology is centered around an 11.2-inch portrait-oriented touchscreen powered by Android Automotive OS—the first production car to feature Google's automotive operating system natively integrated, including Google Maps, Google Assistant, and Google Play Store. Safety features include Volvo's comprehensive suite of driver assistance systems. The Performance Pack option adds Öhlins dual-flow valve dampers, Brembo brakes, and distinctive 20-inch forged wheels for enhanced handling capabilities. The Polestar 2 established itself as a compelling alternative to Tesla and traditional premium brand electric vehicles."

  - name: "First Generation (2024 Facelift)"
    start_year: 2024
    end_year: null
    description: "An updated Polestar 2 was revealed in January 2023 for the 2024 model year, representing a significant facelift with major mechanical and visual changes. Rear-wheel drive became the standard drivetrain for the entry-level single-motor model instead of the previous front-wheel drive configuration, improving efficiency and driving dynamics. The single motor was upgraded to produce 295 hp and 361 lb-ft of torque, an increase of 68 hp and 44 lb-ft, resulting in faster acceleration (0-60 mph in 5.9 seconds). The long range trim's battery was upgraded to 82 kWh capacity (79 kWh usable) from the previous 78 kWh. The dual-motor model's output was increased to 421 hp and 546 lb-ft, enabling 0-60 mph in 4.3 seconds. Dual-motor models now use an asynchronous motor in the front that can disengage to increase efficiency and range. The front end received a major visual update, exchanging the grid-like grille for a more covered version with a 'SmartZone' panel housing sensors and a camera array. The interior continues with minimalist Scandinavian design and Android Automotive OS integration. This facelift represents a substantial evolution of Polestar's first mass-production electric vehicle."